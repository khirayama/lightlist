<!doctype html>
<html lang="ja" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lightlist</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/brand/logo.svg" sizes="any" type="image/svg+xml" />
    <link
      rel="apple-touch-icon"
      href="/icons/apple-touch-icon.png"
      sizes="180x180"
      type="image/png"
    />
    <meta name="application-name" content="Lightlist" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Lightlist" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#ffffff"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#030712"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("lightlist.theme");
          var d =
            t === "dark" ||
            (t !== "light" &&
              matchMedia("(prefers-color-scheme:dark)").matches);
          if (d) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <link
      rel="preload"
      as="style"
      href="/fonts/gen-interface-jp/400.css"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <link
      rel="preload"
      as="style"
      href="/fonts/gen-interface-jp/500.css"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <link
      rel="preload"
      as="style"
      href="/fonts/gen-interface-jp/600.css"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <link
      rel="preload"
      as="style"
      href="/fonts/gen-interface-jp/700.css"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <link
      rel="preload"
      as="style"
      href="/fonts/gen-interface-jp/display-700.css"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <link
      rel="preload"
      as="style"
      href="/fonts/gen-interface-jp/display-800.css"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link rel="stylesheet" href="/fonts/gen-interface-jp/400.css" />
      <link rel="stylesheet" href="/fonts/gen-interface-jp/500.css" />
      <link rel="stylesheet" href="/fonts/gen-interface-jp/600.css" />
      <link rel="stylesheet" href="/fonts/gen-interface-jp/700.css" />
      <link rel="stylesheet" href="/fonts/gen-interface-jp/display-700.css" />
      <link rel="stylesheet" href="/fonts/gen-interface-jp/display-800.css" />
    </noscript>

    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://apis.google.com" />
  </head>
  <body data-page="app">
    <div id="root"></div>
    <script type="module" src="../../src/entry.tsx"></script>
  </body>
</html>
