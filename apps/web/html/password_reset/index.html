<!doctype html>
<html lang="ja" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lightlist</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link
      rel="icon"
      href="/icons/icon-192.png"
      sizes="192x192"
      type="image/png"
    />
    <link
      rel="apple-touch-icon"
      href="/icons/apple-touch-icon.png"
      sizes="180x180"
      type="image/png"
    />
    <meta name="application-name" content="Lightlist" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Lightlist" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#ffffff"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#0b0b0b"
    />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://apis.google.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --font-inter: "Inter", sans-serif;
        --font-noto-sans-jp: "Noto Sans JP", sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="../../src/entries/password-reset.tsx"></script>
  </body>
</html>
