name: Lightlist
options:
  deploymentTarget:
    iOS: "17.0"
packages:
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    PASSWORD_RESET_URL: https://lightlist.com/password_reset
    SWIFT_VERSION: 5.0
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
targets:
  Lightlist:
    type: application
    platform: iOS
    sources:
      - path: Lightlist/Sources
      - path: Lightlist/Resources
        buildPhase: resources
    dependencies:
      - package: FirebaseSDK
        product: FirebaseAuth
      - package: FirebaseSDK
        product: FirebaseFirestore
      - package: FirebaseSDK
        product: FirebaseAnalytics
      - package: FirebaseSDK
        product: FirebaseCrashlytics
      - package: FirebaseSDK
        product: FirebaseAppCheck
    postBuildScripts:
      - script: |
          "${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
          touch "${DERIVED_FILE_DIR}/firebase-crashlytics-dsym-upload"
        name: "Firebase Crashlytics dSYM Upload"
        inputFiles:
          - "$(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)"
          - "$(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)/Contents/Resources/DWARF/$(PRODUCT_NAME)"
          - "$(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)/Contents/Info.plist"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/GoogleService-Info.plist"
          - "$(TARGET_BUILD_DIR)/$(EXECUTABLE_PATH)"
        outputFiles:
          - "$(DERIVED_FILE_DIR)/firebase-crashlytics-dsym-upload"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: "\"Lightlist/Resources/Preview Content\""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_PASSWORD_RESET_URL: $(PASSWORD_RESET_URL)
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - lightlist
        CODE_SIGN_ENTITLEMENTS: Lightlist/Lightlist.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.lightlist.app
        PRODUCT_NAME: Lightlist
    scheme:
      testTargets:
        - LightlistTests
  LightlistTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Lightlist/Tests
    dependencies:
      - target: Lightlist
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.lightlist.appTests
        PRODUCT_NAME: LightlistTests
