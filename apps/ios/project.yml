name: Lightlist
options:
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ja
packages:
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "12.16.0"
  LicensePlist:
    url: https://github.com/mono0926/LicensePlist
    from: "3.27.9"
settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    PASSWORD_RESET_URL: https://lightlist.com/password_reset
    SWIFT_VERSION: 6.0
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
targets:
  Lightlist:
    type: application
    platform: iOS
    info:
      path: Lightlist/Info.plist
      properties:
        CFBundleDevelopmentRegion: ja
        CFBundleLocalizations:
          - ja
          - en
          - es
          - de
          - fr
          - ko
          - zh-Hans
          - hi
          - ar
          - pt-BR
          - id
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - lightlist
        UIAppFonts:
          - GenInterfaceJP-Regular.ttf
          - GenInterfaceJP-Medium.ttf
          - GenInterfaceJP-SemiBold.ttf
          - GenInterfaceJP-Bold.ttf
          - GenInterfaceJPDisplay-Bold.ttf
        PASSWORD_RESET_URL: $(PASSWORD_RESET_URL)
    sources:
      - path: Lightlist/Sources
      - path: Lightlist/Resources
        buildPhase: resources
        excludes:
          - Firebase/**
      - path: ../../shared/licenses/manual-licenses.json
        buildPhase: resources
    dependencies:
      - package: FirebaseSDK
        product: FirebaseAppCheck
      - package: FirebaseSDK
        product: FirebaseAuth
      - package: FirebaseSDK
        product: FirebaseFirestore
      - package: FirebaseSDK
        product: FirebaseAnalytics
      - package: FirebaseSDK
        product: FirebaseCrashlytics
    buildToolPlugins:
      - plugin: LicensePlistBuildTool
        package: LicensePlist
    preBuildScripts:
      - script: |
          if [ ! -f "${FIREBASE_PLIST_SOURCE}" ]; then
            echo "Missing Firebase config: ${FIREBASE_PLIST_SOURCE}" >&2
            exit 1
          fi
          cp "${FIREBASE_PLIST_SOURCE}" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/GoogleService-Info.plist"
        name: "Copy Firebase Config"
        inputFiles:
          - "$(FIREBASE_PLIST_SOURCE)"
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/GoogleService-Info.plist"
    postBuildScripts:
      - script: |
          echo "Copy LicensePlist output"
          ACKNOWLEDGEMENTS_DIR="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/com.mono0926.LicensePlist.Output"
          DESTINATION_PATH="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Acknowledgements"
          rm -rf "${DESTINATION_PATH}"
          mkdir -p "${DESTINATION_PATH}"
          if [ -d "${ACKNOWLEDGEMENTS_DIR}" ]; then
            cp -R "${ACKNOWLEDGEMENTS_DIR}"/. "${DESTINATION_PATH}"
          fi
        name: "Copy LicensePlist Output"
      - script: |
          "${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
          touch "${DERIVED_FILE_DIR}/firebase-crashlytics-dsym-upload"
        name: "Firebase Crashlytics dSYM Upload"
        inputFiles:
          - "$(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)"
          - "$(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)/Contents/Resources/DWARF/$(PRODUCT_NAME)"
          - "$(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)/Contents/Info.plist"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/GoogleService-Info.plist"
          - "$(TARGET_BUILD_DIR)/$(EXECUTABLE_PATH)"
        outputFiles:
          - "$(DERIVED_FILE_DIR)/firebase-crashlytics-dsym-upload"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: "\"Lightlist/Resources/Preview Content\""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        CODE_SIGN_ENTITLEMENTS: Lightlist/Lightlist.entitlements
        FIREBASE_PLIST_SOURCE: $(SRCROOT)/Lightlist/Resources/Firebase/Debug/GoogleService-Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.lightlist.app
        PRODUCT_NAME: Lightlist
      configs:
        Release:
          FIREBASE_PLIST_SOURCE: $(SRCROOT)/Lightlist/Resources/Firebase/Release/GoogleService-Info.plist
    scheme:
      testTargets:
        - LightlistTests
  LightlistTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Lightlist/Tests
    dependencies:
      - target: Lightlist
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.lightlist.appTests
        PRODUCT_NAME: LightlistTests
